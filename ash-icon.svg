<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 32" width="26" height="20">
  <!-- Piano di cenere -->
  <ellipse cx="20" cy="27" rx="16" ry="3.5" fill="#999" opacity=".4"/>
  <!-- Mucchio principale -->
  <ellipse cx="20" cy="22" rx="14" ry="6" fill="#b0b0b0"/>
  <ellipse cx="20" cy="21" rx="10" ry="4.5" fill="#c8c8c8"/>
  <ellipse cx="20" cy="20" rx="7" ry="3.5" fill="#d8d8d8"/>
  <!-- Strati scuri nelle ceneri (striature) -->
  <ellipse cx="15" cy="23" rx="3" ry="1.2" fill="#777" opacity=".6"/>
  <ellipse cx="24" cy="22.5" rx="2.5" ry="1" fill="#666" opacity=".5"/>
  <ellipse cx="19" cy="21" rx="2" ry=".8" fill="#888" opacity=".5"/>
  <!-- Particelle sparse attorno -->
  <circle cx="6" cy="24" r="1.5" fill="#aaa" opacity=".6"/>
  <circle cx="34" cy="23" r="1.2" fill="#aaa" opacity=".5"/>
  <circle cx="9" cy="21" r="1" fill="#bbb" opacity=".5"/>
  <circle cx="31" cy="20" r=".8" fill="#bbb" opacity=".4"/>
  <circle cx="12" cy="19" r=".7" fill="#ccc" opacity=".4"/>
  <circle cx="28" cy="18" r=".6" fill="#ccc" opacity=".4"/>
  <!-- Braci quasi spente -->
  <circle cx="18" cy="20" r="1" fill="#cc4400" opacity=".5"/>
  <circle cx="23" cy="21" r=".7" fill="#dd3300" opacity=".4"/>
  <circle cx="15" cy="22" r=".5" fill="#bb5500" opacity=".4"/>
  <!-- Particelle volanti in alto -->
  <circle cx="16" cy="15" r=".6" fill="#aaa" opacity=".3"/>
  <circle cx="22" cy="13" r=".5" fill="#bbb" opacity=".25"/>
  <circle cx="19" cy="11" r=".4" fill="#ccc" opacity=".2"/>
</svg>
